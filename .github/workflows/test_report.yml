name: 'Test Report'
on:
  workflow_run:
    workflows: ['CI Tests']                     # runs after CI workflow
    types:
      - completed
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
jobs:
  report:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '*.xml'
          check_name: 'Python Test Results'
          comment_mode: always
          compare_to_earlier_commit: true
          # This action shows full error messages and stack traces
          report_individual_runs: true
          deduplicate_classes_by_file_name: false
          # Key additions for workflow_run trigger:
          commit: ${{ github.event.workflow_run.head_sha }}
          event_file: ${{ github.event_path }}
          event_name: ${{ github.event.workflow_run.event }}

      - name: Download coverage artifact
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pytest coverage comment
        if: always()
        continue-on-error: true
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-xml-coverage-path: ./coverage.xml
          # Crucial: Pull the PR number from the workflow_run event
          issue-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          # This enables the "coverage of code touched by PR" view
          report-only-changed-files: true
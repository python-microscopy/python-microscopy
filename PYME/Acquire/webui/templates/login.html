<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <style>
        html,
body {
  height: 100%;
}

body {
  display: -ms-flexbox;
  display: flex;
  -ms-flex-align: center;
  align-items: center;
  padding-top: 40px;
  padding-bottom: 40px;
}

.form-signin {
  width: 100%;
  max-width: 330px;
  padding: 15px;
  margin: auto;
  background-color: #f5f5f5;
  border-width: 1px;
  border-color: #9f9f9f;
  border-style: solid;
  transition: border-color 0.3s, background-color 0.3s;
}

.form-signin.error {
  border-width: 2px;
  border-color: red;
  background-color: #ffdfdf;
}

.form-signin .checkbox {
  font-weight: 400;
}
.form-signin .form-control {
  position: relative;
  box-sizing: border-box;
  height: auto;
  padding: 10px;
  font-size: 16px;
}
.form-signin .form-control:focus {
  z-index: 2;
}
.form-signin input[type="email"] {
  margin-bottom: -1px;
  border-bottom-right-radius: 0;
  border-bottom-left-radius: 0;
}
.form-signin input[type="password"] {
  margin-bottom: 10px;
  border-top-left-radius: 0;
  border-top-right-radius: 0;
}

.error-message {
  display: none;
  color: #721c24;
  background-color: #f8d7da;
  border: 1px solid #f5c6cb;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 4px;
}

.error-message.show {
  display: block;
}
    </style>
</head>
<body class="text-center">

<form class="form-signin" id="loginForm">
    <h3 class="h3 mb-3 font-weight-normal">Sign in to PYMEAcquire</h3>
    <div id="errorMessage" class="error-message"></div>
    <label for="email" class="sr-only">Email:</label>
    <input type="text" id="email" name="email" placeholder="Email address" class="form-control" required>
    <label for="password" class="sr-only">Password: </label>
    <input type="password" id="password" name="password" placeholder="Password" class="form-control" required>
    <button class="btn btn-lg btn-primary btn-block" type="submit" id="submitBtn">Submit</button>
</form>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');
    const form = document.getElementById('loginForm');
    
    // Disable submit button during request
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';
    
    // Clear previous errors
    errorMessage.classList.remove('show');
    form.classList.remove('error');
    
    try {
        const response = await fetch('/do_login?' + new URLSearchParams({
            email: email,
            password: password
        }), {
            method: 'GET'
        });
        
        const data = await response.json();
        
        if (data.success) {
            // Set the auth cookie
            document.cookie = `auth=${data.token}; path=/; SameSite=Strict`;
            
            // Get redirect URL from query params or default to /
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect') || '/';
            
            // Redirect to main page
            window.location.href = redirect;
        } else {
            // Show error
            errorMessage.textContent = data.error || 'Email or password not valid';
            errorMessage.classList.add('show');
            form.classList.add('error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';
        }
    } catch (error) {
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.classList.add('show');
        form.classList.add('error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
    }
});
</script>
</body>
</html>
